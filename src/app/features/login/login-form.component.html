<section class="portal-form-panel" [attr.dir]="dir()">
  <app-honeycomb-deco />
  <div class="form-inner">
    <header class="form-header">
      <h2 class="form-welcome">{{ copy().welcome }}</h2>
      <p class="form-welcome-sub">{{ copy().welcomeSub }}</p>
    </header>

    @if (error()) {
      <div class="error-banner" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="error-icon" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        {{ copy().loginError }}
      </div>
    }

    <form class="portal-form" (submit)="handleSubmit($event)" novalidate>
      <div class="field-group">
        <label class="field-label" for="portal-email">{{ copy().email }}</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </span>
          <input
            id="portal-email"
            type="email"
            class="field-input"
            [placeholder]="copy().emailPlaceholder"
            autocomplete="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
          />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="portal-password">{{ copy().password }}</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input
            id="portal-password"
            [type]="showPwd() ? 'text' : 'password'"
            class="field-input has-toggle"
            [placeholder]="copy().passwordPlaceholder"
            autocomplete="current-password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            required
          />
          <button
            type="button"
            class="pwd-toggle"
            (click)="togglePwd()"
            [attr.aria-label]="showPwd() ? 'Hide password' : 'Show password'"
          >
            @if (showPwd()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-label">
          <input
            type="checkbox"
            class="remember-check"
            [ngModel]="remember()"
            (ngModelChange)="remember.set($event)"
            name="remember"
          />
          <span class="remember-text">{{ copy().remember }}</span>
        </label>
        <button type="button" class="forgot-btn">{{ copy().forgot }}</button>
      </div>

      <button type="submit" class="submit-btn" [class.loading]="loading()" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
        }
        {{ copy().login }}
      </button>
    </form>

    <a href="mailto:info@alwataniya.com.eg" class="support-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="support-icon" aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.38 18 19.5 19.5 0 0 1 5 11.62 19.79 19.79 0 0 1 2.08 4.18 2 2 0 0 1 4.07 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.71 2.81a2 2 0 0 1-.45 2.11L8.09 9.91A16 16 0 0 0 14.09 15.91l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.58 2.81.71A2 2 0 0 1 22 16.92z" />
      </svg>
      {{ copy().support }}
    </a>

    <footer class="form-footer">
      <span class="secure-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="secure-icon" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        {{ copy().secureNote }}
      </span>
      <p class="copyright">&copy; {{ year() }} Al Wataniya Insurance</p>
    </footer>
  </div>
</section>
